name: Release

# Releases are created in the GitHub UI. Publishing one triggers this workflow:
# GoReleaser builds the cross-platform binaries and uploads the archives plus
# checksums to that release. `workflow_dispatch` allows a manual re-run.
# See docs/RELEASING.md.
on:
  release:
    types: [ published ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  goreleaser:
    name: build · archive · publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
