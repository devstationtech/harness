name: Release

# Pushing a semver tag (vX.Y.Z) publishes a release: GoReleaser builds the
# cross-platform binaries, creates the GitHub Release and uploads the archives
# plus checksums. See docs/RELEASING.md.
on:
  push:
    tags: [ 'v*' ]

permissions:
  contents: write

jobs:
  goreleaser:
    name: build · archive · publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
