name: CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: format · vet · lint · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Put GOPATH/bin on PATH
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install dev tools (gofumpt, golangci-lint)
        run: make tools

      # Mirrors the local gate exactly: gofumpt -l check, go vet, golangci-lint, go test.
      - name: Gate
        run: make check
