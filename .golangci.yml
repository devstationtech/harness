version: "2"

# Run with golangci-lint's default linters (errcheck, govet, ineffassign,
# staticcheck, unused). See the go-code-standards rule for the conventions
# these enforce.
linters:
  settings:
    errcheck:
      # Writing to an io.Writer such as os.Stdout in a CLI cannot fail in a way
      # the caller can act on; excluding the fmt.Fprint* family centrally keeps
      # output code readable instead of scattering ignored returns.
      exclude-functions:
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
        # hash.Hash.Write is documented never to return an error.
        - (hash.Hash).Write
